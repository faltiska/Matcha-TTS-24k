_target_: torch.optim.AdamW
_partial_: true

# I can train with LR: 1e-4 and weight_decay: 5e-3 or 1e-3 up to epoch 700
# then with LR: 5e-5 and weight_decay: 5e-4 or 1e-4 
lr: 5e-5

# Original code was using Adam without decay, but I need 1e-3 to fight overfitting.
# The right value depends on the LR and the dropout too, as a smaller dropout allows the model to grow more.
weight_decay: 1e-4

betas: [0.9, 0.99]
eps: 1e-8
