_target_: matcha.data.text_mel_datamodule.TextMelDataModule
name: corpus-small-24k
train_filelist_path: data/corpus-24k/train.csv
valid_filelist_path: data/corpus-24k/validate.csv
# The precompute script will put mels here:
mel_dir: data/corpus-24k/mels

# Not used, use max_frames_per_batch instead 
# batch_size: 33

# See DynamicBatchSampler in text_mel_datamodule
max_frames_per_batch: 32000

num_workers: 16
persistent_workers: true

pin_memory: True
n_spks: 16
n_fft: 1024
n_feats: 100
sample_rate: 24000
hop_length: 256
win_length: 1024
f_min: 0
f_max: 12000
seed: ${seed}
  
data_statistics:
  mel_mean: -4.684777
  mel_std: 6.512275
  
mel_backend: vocos
