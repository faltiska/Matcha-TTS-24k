_target_: matcha.data.speaker_mel_datamodule.SpeakerMelDataModule

train_filelist_path: data/corpus-small-24k/train.csv
mel_dir: data/corpus-small-24k/mels

# Number of reference mels aggregated per training step (one optimizer step per chunk).
# Higher values give the GPU more work per step. Tune based on available VRAM.
refs_per_step: 32

num_workers: 4
pin_memory: true
