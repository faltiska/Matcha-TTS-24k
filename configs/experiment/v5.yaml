# @package _global_
# Documents all changes from v4 to v5 architecture.
# The current default configs already contain these values.

run_name: v5

data:
  max_frames_per_batch: 32000

ckpt_path: null

model:
  # v4: spk_emb_dim: 96 (single dim for all 3 components)
  # v5: separate dims per component
  spk_emb_dim: null
  spk_emb_dim_enc: 96
  spk_emb_dim_dur: 64
  spk_emb_dim_dec: 120

  encoder:
    encoder_params:
      # v4: filter_channels: 864
      filter_channels: 1152
      # v4: n_heads: 4
      n_heads: 6
      # v4: p_dropout: 0.05
      p_dropout: 0.05
    duration_predictor_params:
      # v4: type: conv1
      type: conv2
      # v4: filter_channels_dp: 256
      filter_channels_dp: 128
      # v4: kernel_size: 3
      kernel_size: 5
      # v4: n_layers: 2
      n_layers: 4

  decoder:
    # v4: attention_head_dim: 80
    attention_head_dim: 64
    # v4: num_heads: 4
    num_heads: 5

  cfm:
    # v4: false
    use_mu_prior: true

  optimizer:
    lr: 1e-4
    weight_decay: 1e-3
