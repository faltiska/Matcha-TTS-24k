# @package _global_
# Documents all changes from v4 to v5 architecture.
# The current default configs already contain these values.

run_name: v6

data:
  max_frames_per_batch: 32000

ckpt_path: null

model:
  spk_emb_dim: null
  spk_emb_dim_enc: 96
  spk_emb_dim_dur: 64
  spk_emb_dim_dec: 120

  encoder:
    encoder_params:
      filter_channels: 1152
      n_heads: 6
      p_dropout: 0.05
    duration_predictor_params:
      # v5: type: conv2
      type: conv3
      filter_channels_dp: 128
      kernel_size: 5
      # v4: n_layers: 2
      n_layers: 4

  decoder:
    attention_head_dim: 64
    num_heads: 5

  cfm:
    use_mu_prior: true

  optimizer:
    lr: 1e-4
    weight_decay: 1e-3
