# @package _global_
# Documents all changes from v5 to v6 architecture.
# The current default configs already contain these values.

run_name: v6

data:
  max_frames_per_batch: 30000

ckpt_path: logs/train/v6/checkpoint_epoch=889.ckpt

model:
  spk_emb_dim_enc: 96
  spk_emb_dim_dur: 64

  encoder:
    encoder_params:
      filter_channels: 1152
      n_heads: 6
      p_dropout: 0.05
      
    duration_predictor_params:
      filter_channels_dp: 128
      kernel_size: 5
      # v4: n_layers: 2
      n_layers: 4
      p_dropout: 0.1

  decoder:
    channels: [384, 384]
    attention_head_dim: 64
    num_heads: 6
    dropout: 0.05

  cfm:
    use_mu_prior: true

  optimizer:
    lr: 1e-4
    weight_decay: 1e-3
