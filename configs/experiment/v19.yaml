# @package _global_
#
# Added more speakers (speakers 10-14) and improved speaker 4.
# After that, I could not run with the v19 config as Duration Predictor would not learn.
# Eventually found a working config as follows:
# - I have initialized the Duration Predictor.
# - Separate Speaker Embeddings for Duration Predictor.
# - Duration Predictor gets the full Encoder output as input, including the encoder speaker embedding, still detached.
# - Reduced kernel sizes: Encoder 7 -> 5, Prenet 5 -> 3.
# After these changes, Duration Predictor dropped bellow the v18 loss curve, and Encoder got much better.
#
# Unrelated to the Duration Predictor problem I also:
# - Increased the Decoder size: 384 = 6 * 64, which made the Decoder much better.
# - I also ran with a larger LR: started with LR 8e-5, decay 2e-4, because v18 took too long compared to v17.


run_name: v19

defaults:
  - override /data: corpus-24k

data:
  num_workers: 8
  max_frames_per_batch: 30000

ckpt_path: logs/train/v19/checkpoint_epoch=1278.ckpt

model:
  spk_emb_dim: 96
  # changed from true to false at 1278
  prior_loss: false
  # larger thresholds makes gradients larger (capped at threshold).
  prior_loss_threshold: 0.1
  # I logged the quantiles over 1200 epochs:
  #  p50: 0.02 - 0.04
  #  p75: 0.07 - 0.08
  #  p90: 0.115 - 0.125
  #  p95: 0.15 - 0.16
  #  p99: 0.23 - 0.26
  #  p100: 1.0 - 1.5
  # I would say the right Huber threshold is between 0.15 and 0.25 
  
  encoder:
    encoder_params:
      # 192 + 96 = 288
      # 288 / 6 = 48, divisible by 8
      n_channels: 192
      # 288 * 4 = 1152
      filter_channels: 1152
      n_heads: 6
      n_layers: 4
      kernel_size: 5
      # changed from 0.05 to 0 at 1274
      p_dropout: 0.0
      
      prenet: true
      # should not go over 3, it affects prior loss
      # 5 is slightly worse, 7 is considerably worse 
      prenet_kernel_size: 3
    
    duration_predictor_params:
      filter_channels_dp: 96
      kernel_size: 5
      n_layers: 4
      # changed from 0.05 to 0 at 1274
      p_dropout: 0.0
  
  decoder:
    # other figures that could work
    # 384 = 6 * 64
    # 360 = 5 * 72
    # 336 = 6 * 56
    channels: [384, 384]
    attention_head_dim: 64
    num_heads: 6
    # changed from 0.05 to 0 at 1274
    dropout: 0.0
  
  cfm:
    use_mu_prior: true

  optimizer:
    # Schedule:
    # 0: 8e-5 / 2e-4
    # 669: 6e-5 / 1.5e-4 (I should have done it sooner, probably 474)
    # 924: 4e-5 / 1e-4
    # 1169: 2e-5 / 5e-5
    # lower LRs did not help
    # changed to 2e-5 / 0 at 1274
    lr: 1e-6
    weight_decay: 0
    
callbacks:
  model_checkpoint:
    every_n_epochs: 1

trainer:
  check_val_every_n_epoch: 1
