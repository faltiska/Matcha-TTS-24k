# @package _global_
#
# Leading silence normalization and extra padding with spaces both leading and trailing. 
# More data for speakers 13 and 14, added speaker 15.

run_name: v20

defaults:
  - override /data: corpus-24k

data:
  num_workers: 8
  max_frames_per_batch: 40000

ckpt_path: null

model:
  spk_emb_dim: 96
  prior_loss: true
  # I decided to select the p90 upper value for threshold.
  # A larger value increases the gap between train and validation loss, so I think it affects generalization.
  # Schedule:
  # Epoch 0:
  #  prior_loss_threshold: 0.15
  #  duration_loss_threshold: 0.3
  prior_loss_threshold: 0.1
  duration_loss_threshold: 0.4
  
  encoder:
    encoder_params:
      # Speaker embedding is no longer concatenated; it conditions the encoder via per-layer FiLM,
      # so the backbone runs at n_channels (192), not n_channels + spk_emb_dim.
      # 192 / 6 = 32, divisible by 8
      n_channels: 192
      # 192 * 6 = 1152
      filter_channels: 1152
      n_heads: 6
      n_layers: 4
      kernel_size: 5
      p_dropout: 0.05
      
      prenet: true
      # should not go over 3, it affects prior loss
      # 5 is slightly worse, 7 is considerably worse 
      prenet_kernel_size: 3
    
    duration_predictor_params:
      filter_channels_dp: 96
      kernel_size: 5
      n_layers: 4
      p_dropout: 0.05
  
  decoder:
    # other figures that could work
    # 384 = 6 * 64
    # 360 = 5 * 72
    # 336 = 6 * 56
    channels: [384, 384]
    attention_head_dim: 64
    num_heads: 6
    dropout: 0.05
  
  cfm:
    use_mu_prior: true

  optimizer:
    # Schedule:
    # Epoch 0:
    #  lr: 1e-4
    #  weight_decay: 1e-3
    # Epoch 239:
    #  lr: 8e-5
    #  weight_decay: 8e-4
    lr: 1e-4
    weight_decay: 1e-3
    
callbacks:
  model_checkpoint:
    every_n_epochs: 5

trainer:
  check_val_every_n_epoch: 5
