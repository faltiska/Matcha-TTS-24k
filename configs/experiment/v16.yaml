# @package _global_
# Double resolution for MAS and prior loss.
# Separators between all symbols.
# Larger Decoder 360 = 5 * 72.
# Smaller Duration Predictor, it still showed overfitting. 

run_name: v16

defaults:
  - override /data: corpus-24k

data:
  max_frames_per_batch: 30000

ckpt_path: logs/train/v16/runs/2026-04-06_11-18-45/checkpoints/checkpoint_epoch=349.ckpt

model:
  spk_emb_dim: 96
  prior_loss: true

  encoder:
    encoder_params:
      # 192 + 96 = 288
      # 288 / 6 = 48, divisible by 8
      n_channels: 192
      # 288 * 4 = 1152
      filter_channels: 1152
      n_heads: 6
      n_layers: 4
      kernel_size: 7
      p_dropout: 0.05
      prenet: true
      # should not go over 5, it causes prior loss does not drop well
      prenet_kernel_size: 5 
      
    duration_predictor_params:
      filter_channels_dp: 96
      kernel_size: 5
      n_layers: 4
      p_dropout: 0.05

  decoder:
    # 384 = 6 * 64
    # 360 = 5 * 72
    # 336 = 6 * 56
    channels: [360, 360]
    attention_head_dim: 72
    num_heads: 5
    dropout: 0.05

  cfm:
    use_mu_prior: true

  optimizer:
    lr: 1e-4
    weight_decay: 1e-2
