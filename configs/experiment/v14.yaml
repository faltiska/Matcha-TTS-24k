# @package _global_
# Went back to separators everywhere and v6 encoder size.  
# More weight decay. 
# Smaller duration predictor model, to see if I can get less overfitting.
# Also fixed the language for Bella in inference. It solved a lot of the mispronunciation. 

run_name: v14

defaults:
  - override /data: corpus-24k

data:
  max_frames_per_batch: 30000

ckpt_path: logs/train/v14/checkpoint_epoch=199.ckpt

model:
  spk_emb_dim: 96
  prior_loss: true

  encoder:
    encoder_params:
      # 192 + 96 = 288
      # 288 / 6 = 48, divisible by 8
      n_channels: 192
      # 288 * 4 = 1152
      filter_channels: 1152
      n_heads: 6
      n_layers: 4
      kernel_size: 7
      p_dropout: 0.05
      prenet: true
      prenet_kernel_size: 5
    
    duration_predictor_params:
      filter_channels_dp: 112
      kernel_size: 5
      n_layers: 4
      p_dropout: 0.05

  decoder:
    # 384 = 6 * 64
    # 360 = 5 * 72 
    channels: [336, 336]
    attention_head_dim: 56
    num_heads: 6
    dropout: 0.05

  cfm:
    use_mu_prior: true

  optimizer:
#    lr: 1e-4
#    weight_decay: 1e-2
    lr: 5e-5
    weight_decay: 1e-3
