# @package _global_
# Each voiced phoneme is replaced by '‹', phoneme, '›'
# Added a learned downsampler, but it is commented out for now
# I may need to increase the duration predictor size a bit; look at chart to understand.
# Prior loss starts growing at epoch 55.
# I first attempted to run without any annotations, and I thought that was the cause.
# I ran with '‹', phoneme, '›' before, and it did not happen, so it is the combination of double 
# resolution combined with having a lot of phonemes; 
# I lowered the LR to 5e-5 and resumed from epoch 54, but it still started growing at 56.   
# I resumed from epoch 49 too, it started growing at 59.

run_name: v17

defaults:
  - override /data: corpus-24k

data:
  max_frames_per_batch: 30000

ckpt_path: logs/train/v17/checkpoint_epoch=424.ckpt

model:
  spk_emb_dim: 96
  prior_loss: true

  encoder:
    encoder_params:
      # 192 + 96 = 288
      # 288 / 6 = 48, divisible by 8
      n_channels: 192
      # 288 * 4 = 1152
      filter_channels: 1152
      n_heads: 6
      n_layers: 4
      kernel_size: 7
      p_dropout: 0.05
      prenet: true
      # should not go over 5, it causes prior loss does not drop well
      prenet_kernel_size: 5 
      
    duration_predictor_params:
      filter_channels_dp: 96
      kernel_size: 5
      n_layers: 4
      p_dropout: 0.05

  decoder:
    # other figures that could work
    # 384 = 6 * 64
    # 360 = 5 * 72
    # 336 = 6 * 56
    channels: [360, 360]
    attention_head_dim: 72
    num_heads: 5
    dropout: 0.05

  cfm:
    use_mu_prior: true

  optimizer:
    lr: 5e-5 # lowered from 1e-4 at epoch 234
    weight_decay: 5e-4 # lowered from 1e-3 to 5e-4 at epoch 234
