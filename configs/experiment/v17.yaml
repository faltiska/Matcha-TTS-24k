# @package _global_
# Each voiced phoneme is replaced by '‹', phoneme, '›'
# Added a learned downsampler, but it is commented out for now
# I may need to increase the duration predictor size a bit; look at chart to understand.
# Prior loss starts growing at epoch 55.
# I first attempted to run without any annotations, and I thought that was the cause.
# I ran with '‹', phoneme, '›' before, and it did not happen, so it is the combination of double 
# resolution combined with having a lot of phonemes; 
# I lowered the LR to 5e-5 and resumed from epoch 54, but it still started growing at 56.   
# I resumed from epoch 49 too, it started growing at 59.
#
# The solution was to switch to a smooth_l1 loss formula. I started with a Beta of 0.1, watched the quantiles, 
# then changed to 0.04 at epoch 49.
#
# For fine-tuning, lower LR a lot, say 5e-6, set decay to 0, set dropouts to 0, run 2-3 epochs with all components.
# Save checkpoints and compute validation every epoch.
# Then take the best ckpt from that run, and run for another 2-3 epochs with prior loss set to False,
# so the decoder catches up with the new Encoder state.

run_name: v17

defaults:
  - override /data: corpus-24k

data:
  max_frames_per_batch: 30000

ckpt_path: logs/train/v17/checkpoint_epoch=601.ckpt

model:
  spk_emb_dim: 96
  # changed to false at epoch 601 for fine-tuning 
  prior_loss: false

  encoder:
    encoder_params:
      # 192 + 96 = 288
      # 288 / 6 = 48, divisible by 8
      n_channels: 192
      # 288 * 4 = 1152
      filter_channels: 1152
      n_heads: 6
      n_layers: 4
      kernel_size: 7
      # reduced from 0.05 to 0 at epoch 599 for fine-tuning
      p_dropout: 0
      
      prenet: true
      # should not go over 5, it causes prior loss does not drop well
      prenet_kernel_size: 5 
      
    duration_predictor_params:
      filter_channels_dp: 96
      kernel_size: 5
      n_layers: 4
      p_dropout: 0.05
      
  decoder:
    # other figures that could work
    # 384 = 6 * 64
    # 360 = 5 * 72
    # 336 = 6 * 56
    channels: [360, 360]
    attention_head_dim: 72
    num_heads: 5
    # reduced from 0.05 to 0 at epoch 599 for fine-tuning
    dropout: 0
    
  cfm:
    use_mu_prior: true

  optimizer:
    # lowered from 1e-4 to 5e-5 at epoch 234
    # then to 2e-5 at epoch 424
    # reduced to 5e-6 at epoch 599 for fine-tuning
    lr: 5e-6
    # lowered from 1e-3 to 5e-4 at epoch 234
    # then to 2e-4 at epoch 424
    # reduced to 0 at epoch 599 for fine-tuning
    weight_decay: 0

callbacks:
  model_checkpoint:
    # changed from 5 to 1 at epoch 599 for fine-tuning
    every_n_epochs: 1

trainer:
  # changed from 5 to 1 at epoch 599 for fine-tuning
  check_val_every_n_epoch: 1  
