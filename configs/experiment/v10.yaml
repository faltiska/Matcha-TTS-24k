# @package _global_
# Documents all changes from v6 to v7 architecture.
# V10: V9 with weight decay to fight overfitting

run_name: v10

defaults:
  - override /data: corpus-24k

data:
  max_frames_per_batch: 30000

ckpt_path: null

model:
  spk_emb_dim: 96

  encoder:
    encoder_params:
      # 288 + 96 = 384
      # 384 / 8 = 48, divisible by 8
      n_channels: 288
      # 384 * 3 
      filter_channels: 1152
      n_heads: 8
      n_layers: 6
      kernel_size: 5
      p_dropout: 0.05
      prenet: true
    
    duration_predictor_params:
      filter_channels_dp: 192
      kernel_size: 5
      n_layers: 4
      p_dropout: 0.05

  decoder:
    channels: [384, 384]
    attention_head_dim: 64
    num_heads: 6
    dropout: 0.05

  cfm:
    use_mu_prior: true

  optimizer:
    lr: 1e-4
    weight_decay: 1e-2
