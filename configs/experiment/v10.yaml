# @package _global_
# Documents all changes from v6 to v7 architecture.
# Compared to V9: larger dropout and weight decay to fight overfitting.
# Compared to V8, I tested with:
# - fewer channels, more layers (V9)
# - more channels, more layers (v10)
# and I cannot get the same loss drop as before the symbol grouping change.
# Smaller decoder, sice it does not affect quality much, but improves speed significantly

run_name: v10

defaults:
  - override /data: corpus-24k

data:
  max_frames_per_batch: 30000

ckpt_path: null

model:
  spk_emb_dim: 96

  encoder:
    encoder_params:
      # 288 + 96 = 384
      # 384 / 6 = 64, divisible by 8
      n_channels: 288
      # 384 * 4 
      filter_channels: 1536
      # Both Claude and Gemini recommend 6 heads with a head dim of 64 instead of 8 x 48 
      n_heads: 6
      n_layers: 6
      kernel_size: 5
      p_dropout: 0.05
      prenet: true
    
    duration_predictor_params:
      filter_channels_dp: 192
      kernel_size: 5
      n_layers: 4
      p_dropout: 0.05

  decoder:
    # it would be slightly better with 384 = 64 * 64 but there is a clear impact on performance
    channels: [336, 336]
    attention_head_dim: 56
    num_heads: 6
    dropout: 0.05

  cfm:
    use_mu_prior: true

  optimizer:
    lr: 1e-4
    weight_decay: 1e-2
